name: MCP CI

on:
  pull_request:
    paths:
      - 'src-tauri/crates/braian-mcp-core/**'
      - 'src/lib/ai/mcp-tools.ts'
      - 'src/lib/mcp-runtime-api.ts'
      - 'src/lib/connections-api.ts'
      - 'src/lib/mcp-config-types.ts'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/mcp-ci.yml'
  push:
    branches:
      - main
      - master
    paths:
      - 'src-tauri/crates/braian-mcp-core/**'
      - 'src/lib/ai/mcp-tools.ts'
      - 'src/lib/mcp-runtime-api.ts'
      - 'src/lib/connections-api.ts'
      - 'src/lib/mcp-config-types.ts'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/mcp-ci.yml'

jobs:
  rust-core:
    name: Rust core tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run braian-mcp-core tests
        run: cargo test -p braian-mcp-core

  ts-mcp-tools:
    name: TS MCP tool tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run MCP tool unit tests
        run: npx vitest run src/lib/ai/mcp-tools.active-filter.test.ts src/lib/ai/mcp-tools.validation.test.ts

  integration-server-everything:
    name: MCP integration smoke (server-everything)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install dependencies
        run: npm ci --prefix ..
      - name: Run runtime smoke with server-everything
        env:
          BRAIAN_MCP_INTEGRATION: '1'
        run: cargo test -p braian-mcp-core --test runtime_smoke -- --nocapture
